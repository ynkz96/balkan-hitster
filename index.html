<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balkan Hitster - YT Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 350px; margin: auto; border-radius: 20px; overflow: hidden; border: 3px solid #FF0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        .status { color: #FF0000; margin: 20px; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        
        /* SKRIVENI PLAYER */
        #yt-player-container { width: 1px; height: 1px; opacity: 0; position: absolute; pointer-events: none; }
        
        .btn { background: #FF0000; border: none; padding: 15px 40px; color: white; border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; display: none; transition: 0.3s; }
        .btn:active { transform: scale(0.95); background: #b30000; }
        #debug { font-size: 10px; color: #333; margin-top: 30px; }
    </style>
</head>
<body>

    <h2 style="color:#FF0000; letter-spacing: 2px;">BALKAN <span style="color:white">HITSTER</span></h2>
    
    <div id="reader"></div>
    <div id="status">SPREMAN ZA SKENIRANJE</div>

    <div id="yt-player-container">
        <div id="player"></div>
    </div>

    <button id="stop-btn" class="btn" onclick="stopMusic()">STOP / SLEDEĆA</button>

    <div id="debug"></div>

    <script>
        let statusDiv = document.getElementById('status');
        let stopBtn = document.getElementById('stop-btn');
        let debugDiv = document.getElementById('debug');

        function onScanSuccess(decodedText) {
            debugDiv.innerText = "Skeniran ID: " + decodedText;
            
            // Očistimo ID u slučaju da skener uhvati razmake
            let videoId = decodedText.trim();

            statusDiv.innerText = "UČITAVAM MUZIKU...";
            
            // Ubacujemo YouTube iframe sa autoplay-om
            // Koristimo API embed format koji najbolje radi na mobilnim uređajima
            document.getElementById('player').innerHTML = `
                <iframe width="200" height="200" 
                src="https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&disablekb=1&modestbranding=1" 
                frameborder="0" allow="autoplay; encrypted-media"></iframe>`;

            stopBtn.style.display = "inline-block";
            statusDiv.innerText = "MUZIKA SVIRA... (Blind Test)";
            
            // Pauziramo skener da ne bi stalno skenirao istu kartu
            html5QrcodeScanner.pause();
        }

        function stopMusic() {
            document.getElementById('player').innerHTML = ""; // Brišemo player (zaustavlja zvuk)
            stopBtn.style.display = "none";
            statusDiv.innerText = "SKENIRAJ NOVU KARTU";
            html5QrcodeScanner.resume(); // Vraćamo skener u život
        }

        // Inicijalizacija skenera
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: {width: 250, height: 250},
            aspectRatio: 1.0
        });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
