<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balkan HitMaster Party Game</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4d4d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #ff4d4d;
            --bg: #0a0a0b;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a1c 0%, #0a0a0b 100%);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* --- SPLASH SCREEN --- */
        #splash-page { background: var(--bg); z-index: 100; }
        .loader-ring {
            border: 3px solid var(--glass);
            border-left-color: var(--primary);
            width: 50px; height: 50px;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 25px;
        }

        /* --- MENU PAGE --- */
        .logo-area h1 { font-size: 34px; font-weight: 900; letter-spacing: -1px; margin: 0; text-transform: uppercase; }
        .logo-accent { color: var(--primary); }
        
        .disclaimer {
            position: absolute;
            bottom: 30px;
            font-size: 10px;
            opacity: 0.4;
            max-width: 85%;
            line-height: 1.5;
        }

        /* --- SCANNER PAGE --- */
        #reader { 
            width: 100%; max-width: 320px; 
            border-radius: 24px; overflow: hidden; 
            border: 2px solid var(--glass);
            background: #000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        /* --- PLAYER PAGE (VINYL) --- */
        .vinyl-container {
            width: 260px; height: 260px;
            background: #111;
            border-radius: 50%;
            border: 12px solid #1a1a1a;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: repeating-radial-gradient(#111, #111 2px, #181818 3px, #111 4px);
        }

        .vinyl-playing { animation: spin 3s linear infinite; }

        .vinyl-label {
            width: 90px; height: 90px;
            background: var(--primary);
            border-radius: 50%;
            border: 6px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vinyl-center { width: 10px; height: 10px; background: #000; border-radius: 50%; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- BUTTONS --- */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px 45px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 77, 77, 0.4);
            transition: 0.3s;
            margin-top: 35px;
        }
        .btn:active { transform: scale(0.92); box-shadow: 0 5px 15px rgba(255, 77, 77, 0.2); }
        .btn-secondary { background: var(--glass); box-shadow: none; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; }

        #yt-hidden { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div id="splash-page" class="page active">
        <h1 style="letter-spacing: 4px; font-weight: 900;">BALKAN<span class="logo-accent">MASTER</span></h1>
        <div class="loader-ring"></div>
    </div>

    <div id="menu-page" class="page">
        <div class="logo-area">
            <h1>Balkan <span class="logo-accent">HitMaster</span></h1>
            <p style="opacity: 0.5; margin-top: 8px; letter-spacing: 5px; font-size: 11px;">PARTY GAME</p>
        </div>
        <button class="btn" onclick="goToScanner()">Hajde da ludujemo</button>
        
        <div class="disclaimer">
            Aplikacija samo olakšava pretragu javno dostupnog sadržaja na YouTube/Spotify platformama. Autor ne posjeduje prava na muziku. App je otvorenog koda i dostupan free na GitHub-u.
        </div>
    </div>

    <div id="scanner-page" class="page">
        <p style="margin-bottom: 25px; font-weight: 800; color: var(--primary); letter-spacing: 2px;">SKENIRAJ KARTU</p>
        <div id="reader"></div>
        <button class="btn btn-secondary" onclick="showPage('menu-page')">Odustani</button>
    </div>

    <div id="player-page" class="page">
        <div id="vinyl" class="vinyl-container">
            <div class="vinyl-label">
                <div class="vinyl-center"></div>
            </div>
        </div>
        <p id="player-status" style="margin-top: 35px; opacity: 0.6; letter-spacing: 2px; font-size: 14px;">PRIPREMA...</p>
        <button class="btn" id="play-btn" onclick="startPlayback()">▶ Pusti muziku</button>
        <button class="btn" id="next-btn" style="display:none;" onclick="nextCard()">✕ Iduća karta</button>
    </div>

    <div id="yt-hidden"></div>

    <script>
        let currentId = "";
        let html5QrcodeScanner;

        window.addEventListener('load', () => {
            setTimeout(() => {
                showPage('menu-page');
            }, 2500);
        });

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function goToScanner() {
            showPage('scanner-page');
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                    fps: 20, qrbox: 250, aspectRatio: 1.0 
                });
            }
            html5QrcodeScanner.render(onScanSuccess);
        }

        function onScanSuccess(decodedText) {
            currentId = decodedText.trim();
            if(currentId.includes("v=")) currentId = currentId.split("v=")[1].substring(0,11);
            
            if(currentId.length >= 11) {
                html5QrcodeScanner.pause();
                showPage('player-page');
                document.getElementById('play-btn').style.display = "block";
                document.getElementById('next-btn').style.display = "none";
                document.getElementById('player-status').innerText = "SPREMAN ZA PARTY";
                document.getElementById('vinyl').classList.remove('vinyl-playing');
                if (navigator.vibrate) navigator.vibrate(100);
            }
        }

        function startPlayback() {
            document.getElementById('yt-hidden').innerHTML = `
                <iframe width="100" height="100" 
                src="https://www.youtube.com/embed/${currentId}?autoplay=1" 
                allow="autoplay"></iframe>`;
            
            document.getElementById('play-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
            document.getElementById('player-status').innerText = "MUZIKA SVIRA...";
            document.getElementById('vinyl').classList.add('vinyl-playing');
        }

        function nextCard() {
            document.getElementById('yt-hidden').innerHTML = ""; 
            document.getElementById('vinyl').classList.remove('vinyl-playing');
            showPage('scanner-page');
            html5QrcodeScanner.resume();
        }
    </script>
</body>
</html>
