<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balkan Hitster - YouTube Edition</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        #reader { width: 100%; max-width: 350px; margin: auto; border-radius: 15px; overflow: hidden; border: 2px solid #FF0000; }
        
        /* Potpuno sakrivamo video, ostavljamo samo kontrolnu traku ako treba */
        #player-container { 
            margin-top: 20px; 
            width: 300px; 
            height: 60px; /* Jako nisko, samo za kontrole */
            overflow: hidden; 
            position: relative; 
            margin-left: auto; 
            margin-right: auto;
            display: none;
            background: #000;
            border-radius: 30px;
        }

        #yt-player {
            position: absolute;
            top: -50px; /* Guramo video gore van vidokruga */
            left: 0;
            width: 100%;
            height: 200px;
        }

        /* Maska preko svega */
        #blind-mask {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #FF0000;
            border-radius: 30px;
        }

        .status { color: #FF0000; margin: 10px; font-weight: bold; }
        .btn { background: #FF0000; color: white; border: none; padding: 15px 30px; border-radius: 30px; margin-top: 10px; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>

    <h2 style="color:#FF0000">BALKAN HITSTER <br><small style="color:white; font-size: 12px;">YouTube Mode</small></h2>
    
    <div id="reader"></div>
    <div id="status" class="status">Skeniraj kartu...</div>

    <div id="player-area" style="display:none;">
        <div id="player-container">
            <div id="blind-mask" onclick="revealInfo()">
                <span id="mask-text">▶ PUSTI / SAKRIJ</span>
            </div>
            <iframe id="yt-player" src="" frameborder="0" allow="autoplay"></iframe>
        </div>
        <p id="song-info" style="display:none; margin-top: 10px; font-size: 14px; color: #aaa;"></p>
    </div>

    <script>
        const player = document.getElementById('yt-player');
        const playerArea = document.getElementById('player-area');
        const container = document.getElementById('player-container');
        const statusDiv = document.getElementById('status');
        const songInfo = document.getElementById('song-info');
        const maskText = document.getElementById('mask-text');

        function onScanSuccess(decodedText) {
            // DecodedText je sada npr. "Zabranjeno Pusenje - Zenica Blues"
            statusDiv.innerText = "Tražim pjesmu...";
            playerArea.style.display = "block";
            container.style.display = "block";
            songInfo.innerText = "Pjesma: " + decodedText;
            songInfo.style.display = "none";
            maskText.innerText = "▶ PUSTI PJESMU";

            // YouTube Search Hack: listType=search i list=QUERY
            // Koristimo youtube-nocookie da izbjegnemo neke redirecte
            const query = encodeURIComponent(decodedText + " audio");
            player.src = `https://www.youtube-nocookie.com/embed?listType=search&list=${query}&autoplay=1`;

            html5QrcodeScanner.pause();
            setTimeout(() => { 
                html5QrcodeScanner.resume(); 
                statusDiv.innerText = "Spreman za novi sken!";
            }, 10000);
        }

        function revealInfo() {
            if (songInfo.style.display === "none") {
                songInfo.style.display = "block";
                maskText.innerText = "SAD VIDIŠ :)";
            } else {
                songInfo.style.display = "none";
                maskText.innerText = "▶ PUSTI / SAKRIJ";
            }
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
